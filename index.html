                e.stopPropagation();
                openSmsImportDialog();
            });

            buttonContainer.appendChild(saveButton);
            buttonContainer.appendChild(loadButton);
            buttonContainer.appendChild(importSmsButton);
            buttonContainer.appendChild(fileInput);
            // Вставлення кнопок після заголовка
            const title = sidebar.querySelector('h3');
            title.parentNode.insertBefore(buttonContainer, title.nextSibling);
        }

        // Ініціалізація функціоналу збереження/завантаження
        document.addEventListener('DOMContentLoaded', addSaveLoadButtons);
        const map = L.map('map').setView([50.4501, 30.5234], 14); // Центр Києва
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        // Константи
        const DEFAULT_CONFIG = {
            AZIMUTH_WIDTH: 120,
            RADIUS: 700,
            COLOR: '#000000',
            POPUP_DISTANCE: 250, // Відступ інфобокса по замовчуванню
            FONT_SIZE: 12,
            FONT_WEIGHT: 'normal',
            FONT_STYLE: 'normal',
            MARKER_SIZE: 17 // px
        };

        // Кешуємо DOM елементи
        const DOM = {
            stationList: document.getElementById('station-list'),
            toggleSidebar: document.getElementById('toggle-sidebar'),
            deleteAll: document.getElementById('delete-all'),
            sidebar: document.getElementById('sidebar'),
            defaultFontSize: document.getElementById('default-font-size'),
            defaultColor: document.getElementById('default-color'),
            defaultBold: document.getElementById('default-bold'),
            defaultItalic: document.getElementById('default-italic'),
            defaultRadius: document.getElementById('default-radius'),
            defaultWidth: document.getElementById('default-width'),
            defaultPopupDistance: document.getElementById('default-popup-distance'),
            defaultGeocode: document.getElementById('default-geocode'),
            defaultMarkerSize: document.getElementById('default-marker-size'),
            defaultMarkerSizeValue: document.getElementById('default-marker-size-value')
        };

        const stations = [];

        // Допоміжні функції
        const calculatePopupPosition = (lat, lng, azimuth) => {
            const oppositeAzimuth = (azimuth + 180) % 360;
            const latOffset = (DEFAULT_CONFIG.POPUP_DISTANCE / 111320) * Math.cos(oppositeAzimuth * (Math.PI / 180));
            const lngOffset = (DEFAULT_CONFIG.POPUP_DISTANCE / (111320 * Math.cos(lat * (Math.PI / 180)))) * Math.sin(oppositeAzimuth * (Math.PI / 180));
            return {
                lat: lat + latOffset,
                lng: lng + lngOffset
            };
        };

        function createAzimuthPolygon(lat, lng, azimuth, radius, width, color) {
            if (width === 360) {
                // If width is 360, create a circle
                return L.circle([lat, lng], {
                    radius: radius,
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.3, // Set opacity to 30%
                    weight: 1
                });
            }
            const startAngle = (azimuth - width / 2) * (Math.PI / 180);
            const endAngle = (azimuth + width / 2) * (Math.PI / 180);
            const points = [[lat, lng]];
            const step = Math.PI / 180;
            for (let angle = startAngle; angle <= endAngle; angle += step) {
                const pointLat = lat + (radius / 111320) * Math.cos(angle);
                const pointLng = lng + (radius / (111320 * Math.cos(lat * (Math.PI / 180)))) * Math.sin(angle);
                points.push([pointLat, pointLng]);
            }
            points.push([lat, lng]); // Замикаємо полігон
            return L.polygon(points, { color, fillColor: color, fillOpacity: 0.2, weight: 1 }); // Set opacity to 30%
        }

        function escapeHtml(value) {
            return (value || '').toString()
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getMetadataLines(metadata = {}) {
            return [
                metadata.phone ? `Номер: ${metadata.phone}` : '',
                metadata.operator ? `Оператор: ${metadata.operator}` : '',
                metadata.imsi ? `IMSI: ${metadata.imsi}` : '',
                metadata.lac || metadata.cid ? `LAC/CID: ${metadata.lac || '-'} / ${metadata.cid || '-'}` : '',
                metadata.mcc || metadata.mnc ? `MCC/MNC: ${metadata.mcc || '-'} / ${metadata.mnc || '-'}` : '',
                metadata.date || metadata.time ? `Час: ${[metadata.date, metadata.time].filter(Boolean).join(' ')}` : '',
                metadata.online ? `В мережі: ${metadata.online}` : '',
                metadata.ageMinutes ? `Давність: ${metadata.ageMinutes} хв.` : ''
            ].filter(Boolean);
        }

        function createPopup(address, azimuth, color, metadata = {}) {
            const div = document.createElement('div');
            div.className = 'info-box';
            div.style.fontSize = `${DEFAULT_CONFIG.FONT_SIZE}px`;
            div.style.fontWeight = `${DEFAULT_CONFIG.FONT_WEIGHT}`;
            div.style.fontStyle = `${DEFAULT_CONFIG.FONT_STYLE}`;
            div.style.borderColor = color;
            div.style.opacity = '1';
            div.style.lineHeight = 'normal';
            div.style.minWidth = '100px'; // Встановлюємо мінімальну ширину
            div.style.maxWidth = '250px'; // Встановлюємо максимальну ширину
            div.style.textAlign = 'left'; // Вирівнюємо текст по лівому краю

            const addressHtml = escapeHtml(address || '').replace(/\r?\n/g, '<br>');
            const metadataHtml = getMetadataLines(metadata)
                .map(line => `<div style="border-color: ${color};">${escapeHtml(line)}</div>`)
                .join('');
            let azimuthHtml = '';
            if (azimuth !== '' && azimuth !== undefined && azimuth !== null) {
                azimuthHtml = `<div style="border-color: ${color};">Азимут: ${azimuth}</div>`;
            }
            div.innerHTML = `
                <div style="border-color: ${color};">${addressHtml}</div>
                ${metadataHtml}
                ${azimuthHtml}
            `;

            // Динамічно регулюємо ширину залежно від вмісту
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.visibility = 'hidden';
            tempDiv.style.whiteSpace = 'nowrap';
            tempDiv.style.fontSize = `${DEFAULT_CONFIG.FONT_SIZE}px`;
            tempDiv.style.fontWeight = `${DEFAULT_CONFIG.FONT_WEIGHT}`;
            tempDiv.style.fontStyle = `${DEFAULT_CONFIG.FONT_STYLE}`;
            tempDiv.innerHTML = addressHtml;
            document.body.appendChild(tempDiv);
            const calculatedWidth = Math.min(Math.max(tempDiv.offsetWidth + 20, 150), 500); // Додаємо відступи та обмежуємо
            div.style.width = `${calculatedWidth}px`;
            document.body.removeChild(tempDiv);

            return L.divIcon({
                html: div,
                className: 'info-box-container',
                iconSize: null, // Дозволяємо динамічний розмір
                iconAnchor: [calculatedWidth / 2, 0] // Вирівнюємо по центру базової станції
            });
        }

        function setupPopupDragging(popup, station) {
            const marker = L.marker([station.popupLat, station.popupLng], {
                icon: popup,
                draggable: true,
                zIndexOffset: 1000
            }).addTo(map);
            marker.on('drag', (e) => {
                const { lat, lng } = e.target.getLatLng();
                station.popupLat = lat;
                station.popupLng = lng;
            });
            marker.on('dragend', () => {
                isRecentlyDragged = true; // Set flag for popup dragging too
                setTimeout(() => {
                    isRecentlyDragged = false;
                }, 300); // Reset flag after short period to prevent accidental station creation
            });
            return marker;
        }

        function createCustomIcon(color, size = DEFAULT_CONFIG.MARKER_SIZE) {
            return L.divIcon({
                className: 'custom-marker',
                html: `
                    <div style="
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        border: 2px solid white;">
                        <div style="
                            width: ${Math.round(size/2)}px;
                            height: ${Math.round(size/2)}px;
                            background: white;
                            border-radius: 50%;"></div>
                    </div>
                `,
                iconSize: [size, size],
                iconAnchor: [Math.round(size/2), Math.round(size/2)]
            });
        }

        function addStation(lat, lng, azimuth = 0, radius = DEFAULT_CONFIG.RADIUS,
            width = DEFAULT_CONFIG.AZIMUTH_WIDTH, color = DEFAULT_CONFIG.COLOR,
            address = '', icon = 'default', markerSize = DEFAULT_CONFIG.MARKER_SIZE,
            metadata = {}) {
            const station = {
                lat,
                lng,
                azimuth,
                radius,
                width,
                color: color || DEFAULT_CONFIG.COLOR,
                address: address,
                metadata: metadata || {},
                icon,
                marker: null,
                polygon: null,
                popup: null,
                popupMarker: null,
                popupLat: null,
                popupLng: null,
                markerSize: markerSize || DEFAULT_CONFIG.MARKER_SIZE
            };

            // Додаємо маркер
            station.marker = L.marker([lat, lng], { draggable: true, icon: createCustomIcon(color, station.markerSize) }).addTo(map);
            setupStationDragging(station);

            // Додаємо полігон
            station.polygon = createAzimuthPolygon(lat, lng, azimuth, radius, width, color);
            station.polygon.addTo(map);

            // Налаштовуємо popup
            const popupPos = calculatePopupPosition(lat, lng, azimuth);
            station.popupLat = popupPos.lat;
            station.popupLng = popupPos.lng;
            station.popup = createPopup(address, azimuth, color, station.metadata);
            station.popupMarker = setupPopupDragging(station.popup, station);

            stations.push(station);
            updateStationList();

            // Update the textarea in the settings with the address
            const textarea = DOM.stationList.querySelector(`.address-input[data-index="${stations.length - 1}"]`);
            if (textarea) {
                textarea.value = station.address;
            }
        }

        // Function to set up dragging for the station marker and polygon without triggering geocoding
        function setupStationDragging(station) {
            // Make the station marker draggable
            station.marker.on('drag', (e) => {
                const { lat, lng } = e.target.getLatLng();
                station.lat = lat;
                station.lng = lng;

                // Update popup position relative to the new station position
                const latOffset = station.popupLat - station.lat;
                const lngOffset = station.popupLng - station.lng;
                station.popupLat = lat + latOffset;
                station.popupLng = lng + lngOffset;

                station.popupMarker.setLatLng([station.popupLat, station.popupLng]);
                updateStationPolygon(station); // Update azimuth polygon position
            });

            // When drag ends, update the station list to reflect new position
            station.marker.on('dragend', () => {
                isRecentlyDragged = true; // Set flag indicating recent drag activity
                setTimeout(() => {
                    isRecentlyDragged = false;
                }, 300); // Reset flag after short period to prevent accidental station creation
                updateStationList();
            });
        }

        function updateStationPolygon(station) {
            // Remove the old polygon
            map.removeLayer(station.polygon);

            // Create and add the updated polygon
            station.polygon = createAzimuthPolygon(
                station.lat,
                station.lng,
                station.azimuth,
                station.radius,
                station.width,
                station.color
            );
            station.polygon.addTo(map);
        }

        function updatePopupPosition(station) {
            // Calculate the new popup position
            const popupPos = calculatePopupPosition(station.lat, station.lng, station.azimuth);
            station.popupLat = popupPos.lat;
            station.popupLng = popupPos.lng;

            // Update the popup marker's position
            station.popupMarker.setLatLng([station.popupLat, station.popupLng]);
        }

        function updatePopupStyle(station) {
            const popupElement = station.popupMarker.getElement();
            if (popupElement) {
                const infoBox = popupElement.querySelector('.info-box');
                if (infoBox) {
                    infoBox.style.padding = '5px';
                    infoBox.style.borderColor = station.color;
                    infoBox.style.opacity = '1'; // Ensure full opacity
                }
            }
        }

        function createStationListItem(station, index) {
            const item = document.createElement('div');
            item.className = 'station-item';
            const metadataLines = getMetadataLines(station.metadata || {});
            const metadataHtml = metadataLines.length
                ? `<div class="station-metadata" style="font-size:11px;color:#444;background:#f4f6f8;border:1px solid #e1e5ea;border-radius:4px;padding:6px;margin:6px 0;">${metadataLines.map(line => `<div>${escapeHtml(line)}</div>`).join('')}</div>`
                : '';
            item.innerHTML = `
                ${metadataHtml}
                <textarea data-index="${index}" class="address-input" style="width:100%;min-height:36px;resize:vertical;">${escapeHtml(station.address || '')}</textarea>
                <label>Радіус (м):</label>
                <input type="number" value="${station.radius}" data-index="${index}" class="radius-input" />
                <label>Азимут (0-360):</label>
                <input type="number" min="0" max="360" value="${station.azimuth}" data-index="${index}" class="azimuth-input" />
                <label>Ширина (0-360):</label>
                <input type="number" value="${station.width}" data-index="${index}" class="width-input" />
                <label>Колір:</label>
                <input type="color" value="${station.color}" data-index="${index}" class="color-input" />
                <label>Розмір маркера: <span class="marker-size-value">${station.markerSize || DEFAULT_CONFIG.MARKER_SIZE}</span> px</label>
                <input type="range" min="0" max="8" step="1" value="${getMarkerSizeIndex(station.markerSize || DEFAULT_CONFIG.MARKER_SIZE)}" data-index="${index}" class="marker-size-input" style="width:100%;">
                <button data-index="${index}" class="delete-button">Видалити</button>
            `;
            return item;
        }

        function updateStationList() {
            const fragment = document.createDocumentFragment();
            stations.forEach((station, index) => {
                fragment.appendChild(createStationListItem(station, index));
            });
            DOM.stationList.innerHTML = ''; // Clear existing list
            DOM.stationList.appendChild(fragment); // Append all at once
        }

        // Обробники подій
        document.getElementById('station-list').addEventListener('input', (e) => {
            e.stopPropagation(); // Запобігання спливанню події
            
            const index = e.target.dataset.index;
            const station = stations[index];
            switch (e.target.className) {
                case 'address-input':
                    const addressValue = e.target.value;
                    station.address = addressValue;
                    // Оновлюємо інфобокс з оновленим текстом
                    station.popup = createPopup(addressValue, station.azimuth, station.color, station.metadata);
                    station.popupMarker.setIcon(station.popup);

                    // Динамічно вирівнюємо інфобокс по центру
                    const popupEl = station.popupMarker.getElement();
                    if (popupEl) {
                        const infoBox = popupEl.querySelector('.info-box');
                        if (infoBox) {
                            const tempDiv = document.createElement('div');
                            tempDiv.style.position = 'absolute';
                            tempDiv.style.visibility = 'hidden';
                            tempDiv.style.whiteSpace = 'nowrap';
                            tempDiv.style.fontSize = `${DEFAULT_CONFIG.FONT_SIZE}px`;
                            tempDiv.style.fontWeight = `${DEFAULT_CONFIG.FONT_WEIGHT}`;
                            tempDiv.style.fontStyle = `${DEFAULT_CONFIG.FONT_STYLE}`;
                            tempDiv.innerHTML = addressValue.replace(/\r?\n/g, '<br>');
                            document.body.appendChild(tempDiv);
                            const calculatedWidth = Math.min(Math.max(tempDiv.offsetWidth + 20, 150), 500);
                            infoBox.style.width = `${calculatedWidth}px`;
                            station.popupMarker.options.icon.options.iconAnchor = [calculatedWidth / 2, 0];
                            station.popupMarker.setIcon(station.popup); // Оновлюємо позицію
                            document.body.removeChild(tempDiv);
                        }
                    }
                    break;
                case 'azimuth-input':
                    if (e.target.value === '') {
                        // Дозволяємо порожнє значення без попередження
                        station.azimuth = '';
                        station.popup = createPopup(station.address, '', station.color, station.metadata);
                        station.popupMarker.setIcon(station.popup);
                        break;
                    }
                    const azimuthValue = parseFloat(e.target.value);
                    if (isNaN(azimuthValue) || azimuthValue < 0 || azimuthValue > 360) {
                        // Reset to previous valid value
                        e.target.value = station.azimuth;
                        alert('Азимут має бути в діапазоні від 0 до 360 градусів.');
                    } else {
                        station.azimuth = azimuthValue;
                        updateStationPolygon(station);
                        station.popup = createPopup(station.address, station.azimuth, station.color, station.metadata);
                        station.popupMarker.setIcon(station.popup);
                    }
                    break;
                case 'radius-input':
                    station.radius = parseFloat(e.target.value);
                    updateStationPolygon(station);
                    break;
                case 'width-input':
                    if (e.target.value === '') {
                        // Дозволяємо порожнє значення без попередження і ховаємо полігон
                        station.width = '';
                        if (station.polygon) {
                            map.removeLayer(station.polygon);
                            station.polygon = null;
                        }
                        // Додаємо: оновлення кольору маркера навіть якщо полігон прихований
                        const newIcon = L.divIcon({
                            className: 'custom-marker',
                            html: `
                                <div style="
                                    width: 14px;
                                    height: 14px;
                                    background: ${station.color};
                                    border-radius: 50%;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    border: 2px solid white;">
                                    <div style="
                                        width: 6px;
                                        height: 6px;
                                        background: white;
                                        border-radius: 50%;"></div>
                                </div>
                            `,
                            iconSize: [14, 14],
                            iconAnchor: [7, 7]
                        });
                        station.marker.setIcon(newIcon);
                        break;
                    }
                    const widthValue = parseFloat(e.target.value);
                    if (isNaN(widthValue) || widthValue < 0 || widthValue > 360) {
                        // Reset to previous valid value
                        e.target.value = station.width;
                        alert('Ширина азимуту має бути в діапазоні від 0 до 360 градусів.');
                    } else {
                        station.width = widthValue;
                        // Якщо полігон був прихований, створити його знову
                        if (!station.polygon) {
                            station.polygon = createAzimuthPolygon(
                                station.lat,
                                station.lng,
                                station.azimuth === '' ? 0 : station.azimuth,
                                station.radius,
                                station.width,
                                station.color
                            );
                            station.polygon.addTo(map);
                        } else {
                            updateStationPolygon(station);
                        }
                    }
                    break;
                case 'color-input':
                    station.color = e.target.value;
                    // Оновлюємо полігон, якщо він є
                    if (station.polygon) {
                        updateStationPolygon(station);
                    }
                    // Оновлюємо маркер завжди
                    station.marker.setIcon(createCustomIcon(station.color, station.markerSize || DEFAULT_CONFIG.MARKER_SIZE));

                    // Update popup border color
                    const popupElement = station.popupMarker.getElement();
                    if (popupElement) {
                        const infoBox = popupElement.querySelector('.info-box');
                        if (infoBox) {
                            infoBox.style.borderColor = station.color;
                        }
                    }
                    break;
                case 'marker-size-input':
                    let idx = parseInt(e.target.value);
                    let val = getMarkerSizeByIndex(idx);
                    station.markerSize = val;
                    station.marker.setIcon(createCustomIcon(station.color, station.markerSize));
                    e.target.parentElement.querySelector('.marker-size-value').textContent = station.markerSize;
                    break;
            }
        });

        document.getElementById('station-list').addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map
            
            if (e.target.classList.contains('delete-button')) {
                const index = e.target.dataset.index;
                map.removeLayer(stations[index].marker);
                map.removeLayer(stations[index].polygon);
                map.removeLayer(stations[index].popupMarker);
                stations.splice(index, 1);
                updateStationList();
            }
        });

        map.on('click', async function (e) {
            // Check if the click originated from a UI element or after a recent drag
            if (e.originalEvent.target.closest('#sidebar') || 
                e.originalEvent.target.closest('#button-container') ||
                e.originalEvent.target.closest('.leaflet-control') ||
                e.originalEvent.target.closest('.info-box') ||
                e.originalEvent.target.closest('.search-container') ||
                isRecentlyDragged) {
                return; // Don't add station if clicking on UI elements or after dragging
            }

            // Prevent adding a new station if the click is near an existing station
            const { lat, lng } = e.latlng;
            const isNearExistingStation = stations.some(station => {
                const distance = map.distance([station.lat, station.lng], [lat, lng]);
                return distance < 50; // Adjusted threshold in meters to avoid duplicate stations
            });

            if (isNearExistingStation) {
                return; // Do not create a new station
            }

            // Show geocoding indicator if geocoding is enabled
            const geocodeEnabled = document.getElementById('default-geocode').checked;
            const indicator = document.getElementById('geocode-indicator');
            
            if (geocodeEnabled) {
                indicator.style.display = 'block';
            }
            
            // Get address only if geocoding is enabled
            const address = geocodeEnabled ? await reverseGeocode(lat, lng) : '';
            
            // Hide indicator after geocoding
            indicator.style.display = 'none';

            // Add station with obtained address
            const defaultAzimuth = 0; // Valid default value in range 0-360
            const stationIndex = stations.length; // Index for the new station
            addStation(lat, lng, defaultAzimuth, DEFAULT_CONFIG.RADIUS, DEFAULT_CONFIG.AZIMUTH_WIDTH, DEFAULT_CONFIG.COLOR, address);

            // Update the textarea in the settings with the geocoded address
            const textarea = DOM.stationList.querySelector(`.address-input[data-index="${stationIndex}"]`);
            if (textarea) {
                textarea.value = address;
                // Update the popup on the map with the same address
                const station = stations[stationIndex];
                station.address = address;
                station.popup = createPopup(station.address, station.azimuth, station.color, station.metadata);
                station.popupMarker.setIcon(station.popup);
            }
        });

        map.on('zoomend', () => {
            stations.forEach(updatePopupStyle);
        });

        function handleToggleSidebar(e) {
            if (e) e.stopPropagation(); // Prevent event bubbling
            DOM.sidebar.classList.toggle('collapsed');
            DOM.toggleSidebar.textContent = DOM.sidebar.classList.contains('collapsed')
                ? 'Розгорнути панель'
                : 'Згорнути панель';

            // Adjust geocode-indicator position
            const indicator = document.getElementById('geocode-indicator');
            if (DOM.sidebar.classList.contains('collapsed')) {
                indicator.style.left = '50%'; // Center without sidebar
            } else {
                indicator.style.left = 'calc(50% + 150px)'; // Center with sidebar
            }

            setTimeout(() => map.invalidateSize(), 300); // Ensure correct map size
        }

        function handleDeleteAll(e) {
            if (e) e.stopPropagation(); // Prevent event bubbling
            stations.forEach(station => {
                map.removeLayer(station.marker);
                map.removeLayer(station.polygon);
                map.removeLayer(station.popupMarker);
            });
            stations.length = 0;
            updateStationList();
        }

        DOM.toggleSidebar.addEventListener('click', handleToggleSidebar);
        DOM.deleteAll.addEventListener('click', handleDeleteAll);

        // Оновлюємо налаштування за замовчуванням
        DOM.defaultFontSize.addEventListener('change', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map
            
            DEFAULT_CONFIG.FONT_SIZE = parseInt(e.target.value);
            stations.forEach(station => {
                const popupElement = station.popupMarker.getElement();
                if (popupElement) {
                    const infoBox = popupElement.querySelector('.info-box');
                    if (infoBox) {
                        infoBox.style.fontSize = `${DEFAULT_CONFIG.FONT_SIZE}px`;
                    }
                }
            });
        });

        DOM.defaultColor.addEventListener('input', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map
            
            DEFAULT_CONFIG.COLOR = e.target.value;
            stations.forEach(station => {
                station.color = DEFAULT_CONFIG.COLOR;
                updateStationPolygon(station);
                // Update marker color without changing its size
                station.marker.setIcon(createCustomIcon(station.color, station.markerSize));
                // Update popup border color
                const popupElement = station.popupMarker.getElement();
                if (popupElement) {
                    const infoBox = popupElement.querySelector('.info-box');
                    if (infoBox) {
                        infoBox.style.borderColor = DEFAULT_CONFIG.COLOR;
                    }
                }
            });

            // Update color input in station settings
            document.querySelectorAll('.color-input').forEach(input => {
                input.value = DEFAULT_CONFIG.COLOR;
            });
        });

        DOM.defaultRadius.addEventListener('change', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map
            
            DEFAULT_CONFIG.RADIUS = parseInt(e.target.value);
            stations.forEach(station => {
                station.radius = DEFAULT_CONFIG.RADIUS;
                updateStationPolygon(station);
            });
        });

        DOM.defaultWidth.addEventListener('change', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map

            const newWidth = e.target.value === '' ? '' : parseInt(e.target.value);
            if (newWidth === '') {
                DEFAULT_CONFIG.AZIMUTH_WIDTH = '';
                stations.forEach(station => {
                    station.width = '';
                    if (station.polygon) {
                        map.removeLayer(station.polygon);
                        station.polygon = null;
                    }
                });
            } else if (isNaN(newWidth) || newWidth < 0 || newWidth > 360) {
                e.target.value = DEFAULT_CONFIG.AZIMUTH_WIDTH;
                alert('Ширина азимуту має бути в діапазоні від 0 до 360 градусів.');
            } else {
                DEFAULT_CONFIG.AZIMUTH_WIDTH = newWidth;
                stations.forEach(station => {
                    station.width = DEFAULT_CONFIG.AZIMUTH_WIDTH;
                    if (!station.polygon) {
                        station.polygon = createAzimuthPolygon(
                            station.lat,
                            station.lng,
                            station.azimuth === '' ? 0 : station.azimuth,
                            station.radius,
                            station.width,
                            station.color
                        );
                        station.polygon.addTo(map);
                    } else {
                        updateStationPolygon(station);
                    }
                });
            }
        });

        DOM.defaultWidth.addEventListener('input', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map

            const newWidth = e.target.value === '' ? '' : parseInt(e.target.value);
            if (newWidth === '') {
                DEFAULT_CONFIG.AZIMUTH_WIDTH = '';
                stations.forEach(station => {
                    station.width = '';
                    if (station.polygon) {
                        map.removeLayer(station.polygon);
                        station.polygon = null;
                    }
                });
            } else if (!isNaN(newWidth) && newWidth >= 0 && newWidth <= 360) {
                DEFAULT_CONFIG.AZIMUTH_WIDTH = newWidth;
                stations.forEach(station => {
                    station.width = DEFAULT_CONFIG.AZIMUTH_WIDTH;
                    if (!station.polygon) {
                        station.polygon = createAzimuthPolygon(
                            station.lat,
                            station.lng,
                            station.azimuth === '' ? 0 : station.azimuth,
                            station.radius,
                            station.width,
                            station.color
                        );
                        station.polygon.addTo(map);
                    } else {
                        updateStationPolygon(station);
                    }
                });
            }
        });

        DOM.defaultPopupDistance.addEventListener('change', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map
            
            DEFAULT_CONFIG.POPUP_DISTANCE = parseInt(e.target.value);
            stations.forEach(station => {
                const popupPos = calculatePopupPosition(station.lat, station.lng, station.azimuth);
                station.popupLat = popupPos.lat;
                station.popupLng = popupPos.lng;
                station.popupMarker.setLatLng([station.popupLat, station.popupLng]);
            });
        });

        DOM.defaultBold.addEventListener('change', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map
            
            DEFAULT_CONFIG.FONT_WEIGHT = e.target.checked ? 'bold' : 'normal';
            stations.forEach(station => {
                const popupElement = station.popupMarker.getElement();
                if (popupElement) {
                    const infoBox = popupElement.querySelector('.info-box');
                    if (infoBox) {
                        infoBox.style.fontWeight = DEFAULT_CONFIG.FONT_WEIGHT;
                    }
                }
            });
        });

        DOM.defaultItalic.addEventListener('change', function(e) {
            e.stopPropagation();
            updateFontStyle(e.target.checked);
        });

        // Optimization: Delegate events to parent container
        document.getElementById('sidebar').addEventListener('click', function(e) {
            e.stopPropagation();
            
            // Event delegation for buttons and inputs
            if (e.target.matches('button, input')) {
                e.stopPropagation();
            }
        });

        // Helper function to update font style for all stations
        function updateFontStyle(isItalic) {
            DEFAULT_CONFIG.FONT_STYLE = isItalic ? 'italic' : 'normal';
            stations.forEach(updateStationStyle);
        }

        // Helper function to update individual station style
        function updateStationStyle(station) {
            const popupElement = station.popupMarker.getElement();
            if (!popupElement) return;
            
            const infoBox = popupElement.querySelector('.info-box');
            if (infoBox) {
                infoBox.style.fontStyle = DEFAULT_CONFIG.FONT_STYLE;
            }
        }
        
        // Prevent map click when interacting with sidebar
        document.getElementById('sidebar').addEventListener('click', (e) => {
            e.stopPropagation();
        });

        DOM.defaultMarkerSize.addEventListener('input', (e) => {
            e.stopPropagation();
            let idx = parseInt(e.target.value);
            let size = getMarkerSizeByIndex(idx);
            DEFAULT_CONFIG.MARKER_SIZE = size;
            DOM.defaultMarkerSizeValue.textContent = size;
            stations.forEach((station, i) => {
                station.markerSize = size;
                station.marker.setIcon(createCustomIcon(station.color, size));
                // Оновити значення повзунка у списку станцій
                const item = DOM.stationList.querySelector(`.marker-size-input[data-index="${i}"]`);
                const valueSpan = DOM.stationList.querySelector(`.marker-size-value[data-index="${i}"]`) || DOM.stationList.querySelector('.marker-size-value');
                if (item) item.value = idx;
                if (valueSpan) valueSpan.textContent = size;
            });
        });

        // --- Marker size pattern ---
        const MARKER_SIZE_PATTERN = [12, 16, 20, 25, 28, 32, 36, 40, 44];

        function getMarkerSizeIndex(size) {
            // Find closest index in pattern
            let idx = MARKER_SIZE_PATTERN.indexOf(size);
            if (idx === -1) {
                // fallback to nearest
                let minDiff = Infinity, minIdx = 0;
                for (let i = 0; i < MARKER_SIZE_PATTERN.length; i++) {
                    let diff = Math.abs(MARKER_SIZE_PATTERN[i] - size);
                    if (diff < minDiff) {
                        minDiff = diff;
                        minIdx = i;
                    }
                }
                return minIdx;
            }
            return idx;
        }

        function getMarkerSizeByIndex(idx) {
            return MARKER_SIZE_PATTERN[idx] || MARKER_SIZE_PATTERN[0];
        }

        // При ініціалізації DOM.defaultMarkerSize.value має відповідати індексу паттерну для початкового розміру
        document.addEventListener('DOMContentLoaded', function () {
            // ...existing code...
            DOM.defaultMarkerSize.value = getMarkerSizeIndex(DEFAULT_CONFIG.MARKER_SIZE);
            DOM.defaultMarkerSizeValue.textContent = DEFAULT_CONFIG.MARKER_SIZE;
            // ...existing code...
        });

        DOM.defaultFontSize.addEventListener('input', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map

            DEFAULT_CONFIG.FONT_SIZE = parseInt(e.target.value);
            stations.forEach(station => {
                const popupElement = station.popupMarker.getElement();
                if (popupElement) {
                    const infoBox = popupElement.querySelector('.info-box');
                    if (infoBox) {
                        infoBox.style.fontSize = `${DEFAULT_CONFIG.FONT_SIZE}px`;
                    }
                }
            });
        });

        DOM.defaultRadius.addEventListener('input', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map

            DEFAULT_CONFIG.RADIUS = parseInt(e.target.value);
            stations.forEach(station => {
                station.radius = DEFAULT_CONFIG.RADIUS;
                updateStationPolygon(station);
            });
        });

        DOM.defaultPopupDistance.addEventListener('input', (e) => {
            e.stopPropagation(); // Prevent event bubbling to map

            DEFAULT_CONFIG.POPUP_DISTANCE = parseInt(e.target.value);
            stations.forEach(station => {
                const popupPos = calculatePopupPosition(station.lat, station.lng, station.azimuth);
                station.popupLat = popupPos.lat;
                station.popupLng = popupPos.lng;
                station.popupMarker.setLatLng([station.popupLat, station.popupLng]);
            });
        });
    </script>
</body>
